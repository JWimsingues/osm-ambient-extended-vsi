# Purpose: ms-b Deployment — receives calls from ms-a, calls ms-c on the VSI.
# ms-b uses Envoy sidecar (not ambient ztunnel) so it can route cross-network to ms-c
# via the east-west gateway AUTO_PASSTHROUGH (port 15443).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ms-b
  namespace: osm-poc-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-b
  namespace: osm-poc-demo
  labels:
    app: ms-b
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-b
  template:
    metadata:
      labels:
        app: ms-b
        version: v1
        topology.istio.io/network: main-network
      annotations:
        # Use Envoy sidecar (not ambient ztunnel) to support cross-network routing to vm-network.
        sidecar.istio.io/inject: "true"
        ambient.istio.io/redirection: disabled
    spec:
      serviceAccountName: ms-b
      containers:
        - name: ms-b
          image: quay.io/jwimsing/osm-poc-ms-b:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: MS_C_URL
              value: "http://ms-c.osm-poc-demo.svc.cluster.local:8080"
            - name: LOG_FORMAT
              value: "json"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
