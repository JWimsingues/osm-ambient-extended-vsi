# Purpose: Register ms-c (VSI workload) into the mesh.
# Per the Red Hat Developer article approach:
# - WorkloadGroup: template for autoregistration when the VM sidecar connects to istiod
# - Service: ClusterIP that cluster workloads use to reach ms-c
# - ServiceEntry: tells the mesh that ms-c is reachable at its registered WorkloadEntry address
#
# When the VM sidecar starts, istiod auto-creates a WorkloadEntry with the VM's registered IP
# (set via INSTANCE_IP=<VSI_PUBLIC_IP> in the VM's cluster.env).
#
# For routing:
# - Cluster → VM (ms-b sidecar → ms-c): direct mTLS to VM public IP (no gateway needed)
# - VM → Cluster (ms-c → ms-a): via east-west gateway port 15443 (AUTO_PASSTHROUGH)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ms-c
  namespace: osm-poc-demo
---
apiVersion: networking.istio.io/v1
kind: WorkloadGroup
metadata:
  name: ms-c
  namespace: osm-poc-demo
spec:
  metadata:
    labels:
      app: ms-c
      version: v1
  template:
    serviceAccount: ms-c
    network: vm-network
---
# ClusterIP service — cluster workloads resolve ms-c via this VIP.
# No selector: endpoints come from the WorkloadEntry (auto-registered by VM sidecar).
apiVersion: v1
kind: Service
metadata:
  name: ms-c
  namespace: osm-poc-demo
  labels:
    app: ms-c
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
# ServiceEntry selects the WorkloadEntry via the app:ms-c label.
# This binds the ClusterIP service to the auto-registered VM endpoint.
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: ms-c
  namespace: osm-poc-demo
spec:
  hosts:
    - ms-c.osm-poc-demo.svc.cluster.local
  location: MESH_INTERNAL
  ports:
    - number: 8080
      name: http
      protocol: HTTP
  resolution: STATIC
  workloadSelector:
    labels:
      app: ms-c
