# Purpose: Represent ms-c on IBM Cloud VSI in the mesh (WorkloadGroup + WorkloadEntry + Service).
# Replace VSI_PRIVATE_IP with the VSI address reachable from the cluster (and east-west gateway).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ms-c
  namespace: osm-poc-demo
---
apiVersion: networking.istio.io/v1
kind: WorkloadGroup
metadata:
  name: ms-c
  namespace: osm-poc-demo
spec:
  metadata:
    labels:
      app: ms-c
      version: v1
  template:
    serviceAccount: ms-c
    network: vsi-network
---
apiVersion: networking.istio.io/v1
# metadata.name must match PROXY_WORKLOAD_INFO on the VSI (osm-poc-demo/<name>/ms-c).
kind: WorkloadEntry
metadata:
  name: ms-c-vsi
  namespace: osm-poc-demo
  labels:
    app: ms-c
    version: v1
spec:
  address: ${VSI_PRIVATE_IP}
  labels:
    app: ms-c
    version: v1
    ambient.istio.io/redirection: enabled
    topology.istio.io/network: vsi-network
  serviceAccount: ms-c
  ports:
    http: 8080
---
# Binds the ClusterIP Service VIP to the VSI IP. Required for ambient ztunnel: a Service
# without selector has no kube-proxy endpoints; istioctl shows 0/0 until this exists.
# (ServiceEntry + workloadSelector alone is not enough — VIP must map to the backend.)
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: ms-c-vsi
  namespace: osm-poc-demo
  labels:
    kubernetes.io/service-name: ms-c
addressType: IPv4
ports:
  - name: http
    port: 8080
    protocol: TCP
endpoints:
  - addresses:
      - "${VSI_PRIVATE_IP}"
    conditions:
      ready: true
    # Align with WorkloadEntry serviceAccount (avoids ztunnel registering sa/default).
    serviceAccountName: ms-c
---
apiVersion: v1
kind: Service
metadata:
  name: ms-c
  namespace: osm-poc-demo
  labels:
    app: ms-c
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
