# Purpose: Istio control plane with ambient profile and multi-network mesh identity.
apiVersion: sailoperator.io/v1
kind: Istio
metadata:
  name: default
spec:
  namespace: istio-system
  profile: ambient
  values:
    global:
      meshID: mesh1
      network: main-network
      multiCluster:
        clusterName: rocks-cluster
      meshNetworks:
        # Reach cluster workloads (main-network) via east-west HBONE gateway.
        main-network:
          endpoints:
            - fromRegistry: rocks-cluster
          gateways:
            - registryServiceName: istio-eastwestgateway.istio-system.svc.cluster.local
              port: 15008
    pilot:
      trustedZtunnelNamespace: ztunnel
      env:
        PILOT_ENABLE_WORKLOAD_ENTRY_AUTOREGISTRATION: "true"
        AMBIENT_ENABLE_MULTI_NETWORK: "true"
    meshConfig:
      discoverySelectors:
        - matchLabels:
            istio-discovery: enabled
