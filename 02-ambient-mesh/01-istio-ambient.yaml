# Purpose: Istio control plane (OSM 3.3 / Istio 1.28.6) with ambient + multi-network.
apiVersion: sailoperator.io/v1
kind: Istio
metadata:
  name: default
spec:
  version: v1.28.6
  namespace: istio-system
  profile: ambient
  values:
    global:
      meshID: mesh1
      network: main-network
      multiCluster:
        clusterName: rocks-cluster
      meshNetworks:
        # Reach cluster workloads (main-network) via east-west HBONE gateway.
        main-network:
          endpoints:
            - fromRegistry: rocks-cluster
          gateways:
            - registryServiceName: istio-eastwestgateway.istio-system.svc.cluster.local
              port: 15008
        # VSI workloads (WorkloadEntry spec.network) are reachable at their registered address.
        vsi-network:
          endpoints:
            - fromCidr: 10.243.64.0/24
    pilot:
      trustedZtunnelNamespace: ztunnel
      env:
        PILOT_ENABLE_WORKLOAD_ENTRY_AUTOREGISTRATION: "true"
        AMBIENT_ENABLE_MULTI_NETWORK: "true"
        # OSM 3.3 TP: cross-network HBONE metadata (Istio 1.28+).
        AMBIENT_ENABLE_BAGGAGE: "true"
    meshConfig:
      discoverySelectors:
        - matchLabels:
            istio-discovery: enabled
