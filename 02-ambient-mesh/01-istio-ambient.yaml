# Purpose: Istio control plane with ambient profile and multi-network mesh identity.
apiVersion: sailoperator.io/v1
kind: Istio
metadata:
  name: default
spec:
  namespace: istio-system
  profile: ambient
  values:
    global:
      meshID: mesh1
      network: main-network
      multiCluster:
        clusterName: rocks-cluster
      meshNetworks:
        # Reach cluster workloads (main-network) via east-west HBONE gateway.
        main-network:
          endpoints:
            - fromRegistry: rocks-cluster
          gateways:
            # Public LB IP/hostname reachable from the VSI (not in-cluster ClusterIP).
            # Regenerate after east-west LB reprovision: EW_GATEWAY_HOST from
            # oc -n istio-system get svc istio-eastwestgateway -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
            - address: 3166540a-eu-de.lb.appdomain.cloud
              port: 15008
        # VSI workloads (WorkloadEntry spec.network) are reachable at their registered address.
        vsi-network:
          endpoints:
            - fromCidr: 10.243.64.0/24
    pilot:
      trustedZtunnelNamespace: ztunnel
      env:
        PILOT_ENABLE_WORKLOAD_ENTRY_AUTOREGISTRATION: "true"
        AMBIENT_ENABLE_MULTI_NETWORK: "true"
    meshConfig:
      discoverySelectors:
        - matchLabels:
            istio-discovery: enabled
