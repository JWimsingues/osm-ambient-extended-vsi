# Purpose: Istio control plane (OSM 3.3 / Istio 1.28.6) with ambient + multi-network.
# Following the Red Hat Developer article approach:
# https://developers.redhat.com/articles/2026/04/17/integrate-red-hat-enterprise-linux-vms-openshift-service-mesh
apiVersion: sailoperator.io/v1
kind: Istio
metadata:
  name: default
spec:
  version: v1.28.6
  namespace: istio-system
  profile: ambient
  values:
    global:
      meshID: mesh1
      network: main-network
      multiCluster:
        clusterName: rocks-cluster
      meshNetworks:
        # Cluster workloads on main-network.
        # VM sidecar (ms-c) routes to cluster via east-west gateway on port 15443.
        main-network:
          endpoints:
            - fromRegistry: rocks-cluster
          gateways:
            - registryServiceName: istio-eastwestgateway.istio-system.svc.cluster.local
              port: 15443
        # VM workloads on vm-network.
        # No gateway: cluster sidecar (ms-b) connects directly to the VM's registered public IP.
        vm-network:
          endpoints:
            - fromCidr: 10.243.64.0/24
    pilot:
      trustedZtunnelNamespace: ztunnel
      env:
        PILOT_ENABLE_WORKLOAD_ENTRY_AUTOREGISTRATION: "true"
        PILOT_ENABLE_WORKLOAD_ENTRY_HEALTHCHECKS: "true"
        AMBIENT_ENABLE_MULTI_NETWORK: "true"
    meshConfig:
      discoverySelectors:
        - matchLabels:
            istio-discovery: enabled
