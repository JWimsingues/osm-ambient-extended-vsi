# Purpose: Expose istiod and cross-network data-plane through the east-west gateway.
# Per Red Hat Developer article on RHEL VM integration (OSM 3.3).
#
# istiod-gateway: VM sidecar uses port 15012/15017 (TLS passthrough) to reach istiod.
# cross-network-gateway: VM → cluster data via AUTO_PASSTHROUGH on port 15443 (SNI routing).
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: istiod-gateway
  namespace: istio-system
spec:
  selector:
    istio: eastwestgateway
  servers:
    - port:
        number: 15012
        name: tls-xds
        protocol: TLS
      tls:
        mode: PASSTHROUGH
      hosts:
        - istiod.istio-system.svc
    - port:
        number: 15017
        name: tls-webhook
        protocol: TLS
      tls:
        mode: PASSTHROUGH
      hosts:
        - istiod.istio-system.svc
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: istiod-vs
  namespace: istio-system
spec:
  hosts:
    - istiod.istio-system.svc
  gateways:
    - istiod-gateway
  tls:
    - match:
        - port: 15012
          sniHosts: ["*"]
      route:
        - destination:
            host: istiod.istio-system.svc.cluster.local
            port:
              number: 15012
    - match:
        - port: 15017
          sniHosts: ["*"]
      route:
        - destination:
            host: istiod.istio-system.svc.cluster.local
            port:
              number: 443
---
# cross-network-gateway: SNI-based passthrough for VM → cluster data traffic on port 15443.
# AUTO_PASSTHROUGH: Envoy reads SNI, forwards the raw TLS to the matching cluster endpoint.
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: cross-network-gateway
  namespace: istio-system
spec:
  selector:
    istio: eastwestgateway
  servers:
    - port:
        number: 15443
        name: tls
        protocol: TLS
      tls:
        mode: AUTO_PASSTHROUGH
      hosts:
        - "*.local"
