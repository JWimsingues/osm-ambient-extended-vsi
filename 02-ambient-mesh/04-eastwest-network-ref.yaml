# Purpose: istio-remote reference so ambient ztunnel receives network_gateway for main-network (Istio 1.28.6).
# EW_GATEWAY_HOST is set by apply-eastwest-gateway.sh from the istio-eastwestgateway LoadBalancer.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main-network-ew-ref
  namespace: istio-system
  labels:
    topology.istio.io/network: main-network
spec:
  gatewayClassName: istio-remote
  addresses:
    - type: Hostname
      value: ${EW_GATEWAY_HOST}
  listeners:
    - name: mesh
      port: 15008
      protocol: HBONE
